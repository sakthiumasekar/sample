<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <style>
        *{
            background-color: rgb(2, 2, 2);
            color: white;
        }
    </style>
</head>
<body>
    https://github.com/sakthiumasekar/sample
    <h1 style="text-align: center;">STUDENT FORM</h1>
    <form action="#" method="post">
        <label for="name">NAME : 
            <input type="text" name="name" id="name" required>
        </label><br><br>
        <label for="year">YEAR : 
            <select name="year" id="year" required>
                <option value="">Select</option>
                <option value="1st">I</option>
                <option value="2nd">II</option>
                <option value="3rd">III</option>
            </select>
        </label><br><br>
        <label for="gender" >GENDER :
            <input type="radio" name="gender" id="gender" value="male" required>Male
            <input type="radio" name="gender" id="gender" value="female">Female
            <input type="radio" name="gender" id="gender" value="other">Other
        </label><br><br>
        <label for="dob">DATE OF BIRTH : 
            <input type="date" name="dob" id="dob" required>
        </label><br><br>
        <label for="mail">MAIL ID : 
            <input type="email" name="mail" id="mail" required>
        </label><br><br>
        <label for="lang">Languages known :
            <input type="checkbox" id="lang"  name="lang" value="java">Java
            <input type="checkbox" id="lang" name="lang" value="python">Python
            <input type="checkbox" id="lang" name="lang" value="js">Javascript
        </label><br><br>
        <input type="submit">
    </form>
</body>
</html>
